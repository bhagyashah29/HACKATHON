{% extends 'base.html' %}
{% block content %}
<h2>Submit Expense</h2>
<form method="post" enctype="multipart/form-data">
  <label>Date <input type="date" name="expense_date" required></label><br>
  <label>Category
    <select name="category" required>
      <option>Travel</option>
      <option>Meals</option>
      <option>Supplies</option>
      <option>Lodging</option>
      <option>Other</option>
    </select>
  </label><br>
  <label>Amount <input type="number" name="amount" step="0.01" required></label>
  <label>Currency
    <select name="currency" required>
      {% for c in currencies %}
      <option value="{{ c }}">{{ c }}</option>
      {% endfor %}
    </select>
  </label><br>
  <label>Description<br>
    <textarea name="description" rows="3"></textarea>
  </label><br>
  <label>Receipt <input type="file" name="receipt" accept="image/*,application/pdf"></label><br>
  <button type="submit">Submit</button>
</form>
{% endblock %}
